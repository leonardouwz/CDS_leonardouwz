<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task & User Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── VARIABLES ───────────────────────────── */
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f135;
      --accent2: #35f1c8;
      --text: #e8e8e8;
      --muted: #666;
      --danger: #ff4d4d;
      --radius: 10px;
    }

    /* ── RESET ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px 80px;
    }

    /* ── HEADER ──────────────────────────────── */
    header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }
    .badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      background: var(--accent);
      color: #000;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 500;
    }

    /* ── TABS ────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }
    .tab-btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* ── PANELS ──────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── SECTION ─────────────────────────────── */
    .section-title {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── FORM CARD ───────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }
    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 140px;
    }
    label {
      font-size: 0.7rem;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
    }
    input {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }

    /* ── BUTTONS ─────────────────────────────── */
    .btn {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 9px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-size: 0.7rem; padding: 5px 10px; }
    .btn-done { background: transparent; border: 1px solid var(--accent2); color: var(--accent2); font-size: 0.7rem; padding: 5px 10px; }
    .btn:hover { opacity: 0.85; }

    /* ── TABLE ───────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 10px 12px;
    }
    td {
      padding: 12px 12px;
      border-bottom: 1px solid #1e1e1e;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1a1a1a; }

    .tag-done {
      display: inline-block;
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1px;
      background: #1a3300;
      color: var(--accent);
      border: 1px solid #2d5500;
    }
    .tag-pending {
      display: inline-block;
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1px;
      background: #1e1e00;
      color: #aaa;
      border: 1px solid #333;
    }

    /* ── ACTIONS ─────────────────────────────── */
    .actions { display: flex; gap: 6px; }

    /* ── TOAST ───────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--accent);
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 10px 20px;
      border-radius: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { background: var(--danger); color: #fff; }

    /* ── EMPTY STATE ─────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<header>
  <h1>Session <span>01</span> — Flask</h1>
  <span class="badge">localhost:5000</span>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('tasks')">Tasks</button>
  <button class="tab-btn" onclick="switchTab('users')">Users</button>
</div>

<!-- ═══════════════ TASKS PANEL ═══════════════ -->
<div id="panel-tasks" class="panel active">

  <p class="section-title">Nueva tarea</p>
  <div class="card">
    <div class="form-row">
      <div class="field">
        <label>Contenido</label>
        <input id="task-content" type="text" placeholder="Ej: Estudiar Flask..." />
      </div>
      <button class="btn btn-primary" onclick="addTask()">Agregar</button>
    </div>
  </div>

  <p class="section-title">Todas las tareas</p>
  <div class="card table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Contenido</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tasks-body">
        <tr><td colspan="4" class="empty">No hay tareas aún.</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- ═══════════════ USERS PANEL ═══════════════ -->
<div id="panel-users" class="panel">

  <p class="section-title">Nuevo usuario</p>
  <div class="card">
    <div class="form-row">
      <div class="field">
        <label>Nombre</label>
        <input id="user-name" type="text" placeholder="Vicente" />
      </div>
      <div class="field">
        <label>Apellido</label>
        <input id="user-lastname" type="text" placeholder="Machaca" />
      </div>
      <div class="field">
        <label>Ciudad</label>
        <input id="user-city" type="text" placeholder="Arequipa" />
      </div>
      <div class="field">
        <label>País</label>
        <input id="user-country" type="text" placeholder="Perú" />
      </div>
      <div class="field">
        <label>Código Postal</label>
        <input id="user-code" type="text" placeholder="04000" />
      </div>
      <button class="btn btn-primary" onclick="addUser()">Agregar</button>
    </div>
  </div>

  <p class="section-title">Todos los usuarios</p>
  <div class="card table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Ciudad</th>
          <th>País</th>
          <th>C. Postal</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="users-body">
        <tr><td colspan="7" class="empty">No hay usuarios aún.</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  const API = "http://127.0.0.1:5000";

  // ── TABS ────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    event.target.classList.add('active');
    tab === 'tasks' ? loadTasks() : loadUsers();
  }

  // ── TOAST ────────────────────────────────────
  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (error ? ' error' : '');
    setTimeout(() => t.className = '', 2500);
  }

  // ════════════════════════════════════════════
  //  TASKS
  // ════════════════════════════════════════════

  async function loadTasks() {
    const res = await fetch(`${API}/tasks`);
    const data = await res.json();
    renderTasks(data.tasks);
  }

  function renderTasks(tasks) {
    const tbody = document.getElementById('tasks-body');
    if (!tasks.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">No hay tareas aún.</td></tr>';
      return;
    }
    tbody.innerHTML = tasks.map(t => `
      <tr>
        <td><span style="font-family:'DM Mono',monospace;color:var(--muted)">#${t.id}</span></td>
        <td>${t.content}</td>
        <td>${t.done
          ? '<span class="tag-done">DONE</span>'
          : '<span class="tag-pending">PENDIENTE</span>'}</td>
        <td class="actions">
          <button class="btn btn-done" onclick="toggleTask(${t.id}, ${!t.done})">
            ${t.done ? 'Reabrir' : 'Completar'}
          </button>
          <button class="btn btn-danger" onclick="deleteTask(${t.id})">Eliminar</button>
        </td>
      </tr>
    `).join('');
  }

  async function addTask() {
    const content = document.getElementById('task-content').value.trim();
    if (!content) { showToast('El contenido no puede estar vacío.', true); return; }
    const res = await fetch(`${API}/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, true); return; }
    showToast('Tarea agregada ✓');
    document.getElementById('task-content').value = '';
    loadTasks();
  }

  async function toggleTask(id, done) {
    const res = await fetch(`${API}/tasks/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ done })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, true); return; }
    showToast('Tarea actualizada ✓');
    loadTasks();
  }

  async function deleteTask(id) {
    if (!confirm('¿Eliminar tarea #' + id + '?')) return;
    const res = await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, true); return; }
    showToast('Tarea eliminada');
    loadTasks();
  }

  // ════════════════════════════════════════════
  //  USERS
  // ════════════════════════════════════════════

  async function loadUsers() {
    const res = await fetch(`${API}/users`);
    const data = await res.json();
    renderUsers(data.users);
  }

  function renderUsers(users) {
    const tbody = document.getElementById('users-body');
    if (!users.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No hay usuarios aún.</td></tr>';
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td><span style="font-family:'DM Mono',monospace;color:var(--muted)">#${u.id}</span></td>
        <td>${u.name}</td>
        <td>${u.lastname}</td>
        <td>${u.address.city}</td>
        <td>${u.address.country}</td>
        <td><span style="font-family:'DM Mono',monospace">${u.address.code}</span></td>
        <td class="actions">
          <button class="btn btn-danger" onclick="deleteUser(${u.id})">Eliminar</button>
        </td>
      </tr>
    `).join('');
  }

  async function addUser() {
    const name     = document.getElementById('user-name').value.trim();
    const lastname = document.getElementById('user-lastname').value.trim();
    const city     = document.getElementById('user-city').value.trim();
    const country  = document.getElementById('user-country').value.trim();
    const code     = document.getElementById('user-code').value.trim();

    if (!name || !lastname || !city || !country || !code) {
      showToast('Todos los campos son obligatorios.', true); return;
    }

    const res = await fetch(`${API}/users`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, lastname, address: { city, country, code } })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, true); return; }
    showToast('Usuario creado ✓');
    ['user-name','user-lastname','user-city','user-country','user-code']
      .forEach(id => document.getElementById(id).value = '');
    loadUsers();
  }

  async function deleteUser(id) {
    if (!confirm('¿Eliminar usuario #' + id + '?')) return;
    const res = await fetch(`${API}/users/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, true); return; }
    showToast('Usuario eliminado');
    loadUsers();
  }

  // Carga inicial
  loadTasks();
</script>
</body>
</html>
